  <style>
    /* Premium hardware-accelerated animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulseSoft {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .animate-fade-in {
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-fade-in-left {
      animation: fadeInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-fade-in-right {
      animation: fadeInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-pulse-soft {
      animation: pulseSoft 2s infinite ease-in-out;
    }
    body {
      overflow-x: hidden;
      overflow-y: auto;
      margin: 0;
      padding: 0;
    }
    /* Clean custom scrollbar */

    }

      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {

    const AlertTriangleIcon = ({ className }) => (

    const CheckCircle2Icon = ({ className }) => (

    const EyeIcon = () => (

    const EyeOffIcon = () => (
      <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61M2 2l20 20"/>
      </svg>
    );

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [theme, setTheme] = useState("dark");
      const [introFinished, setIntroFinished] = useState(
        () => sessionStorage.getItem("drivesphere_intro_seen") === "true"
      );
      const [showPassword, setShowPassword] = useState(false);
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [isFocused, setIsFocused] = useState({});
      const [isLoading, setIsLoading] = useState(false);

      const [authMode, setAuthMode] = useState("login");
      const [operatorName, setOperatorName] = useState("");
      const [confirmPassword, setConfirmPassword] = useState("");
      const [otpCode, setOtpCode] = useState("");
      const [errorMsg, setErrorMsg] = useState("");
      const [successMsg, setSuccessMsg] = useState("");
      const [config, setConfig] = useState({ dashboardUrl: "" });

      useEffect(() => {
        safeFetchJson("/api/config")
          .then(data => {
            if (data && data.dashboard_url) {
              setConfig({ dashboardUrl: data.dashboard_url });
            }
          })
          .catch(err => {
            console.warn("Could not fetch dashboard configuration:", err);
          });
      }, []);

      const introCanvasRef = useRef(null);
      const bgCanvasRef = useRef(null);

      const toggleTheme = () => {
        setTheme((prev) => (prev === "dark" ? "light" : "dark"));
      };

      // 1. Cinematic Intro Canvas Animation
      useEffect(() => {
        if (introFinished) return;
        const canvas = introCanvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;

        let animationFrameId;
        let startTime = null;
        const duration = 5000;

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        resize();
        window.addEventListener("resize", resize);

        const particles = Array.from({ length: 60 }, () => ({
          x: Math.random() * canvas.width,
          y: canvas.height * 0.55 + Math.random() * (canvas.height * 0.45),
          speed: 15 + Math.random() * 25,
          length: 20 + Math.random() * 60,
          alpha: Math.random() * 0.6,
        }));

        const render = (timestamp) => {
          if (!startTime) startTime = timestamp;
          const progress = (timestamp - startTime) / duration;

          if (progress >= 1) {
            sessionStorage.setItem("drivesphere_intro_seen", "true");
            setIntroFinished(true);
            return;
          }

          ctx.fillStyle = theme === "dark" ? "#000000" : "#111111";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Perspective Grid
          ctx.strokeStyle = "rgba(88, 166, 255, 0.15)";
          ctx.lineWidth = 1;
          const horizonY = canvas.height * 0.55;
          const centerX = canvas.width / 2;

          for (let i = -10; i <= 10; i++) {
            ctx.beginPath();
            ctx.moveTo(centerX, horizonY);
            ctx.lineTo(centerX + i * 150, canvas.height);
            ctx.stroke();
          }

          const offset = (timestamp * 0.2) % 40;
          for (let y = horizonY; y < canvas.height; y += 40) {
            const gridY = y + offset;
            if (gridY > canvas.height) continue;
            const alpha = (gridY - horizonY) / (canvas.height - horizonY);
            ctx.strokeStyle = `rgba(88, 166, 255, ${alpha * 0.3})`;
            ctx.beginPath();
            ctx.moveTo(0, gridY);
            ctx.lineTo(canvas.width, gridY);
            ctx.stroke();
          }

          // Particles
          particles.forEach((p) => {
            p.x -= p.speed;
            if (p.x < 0) {
              p.x = canvas.width + 100;
              p.y = horizonY + Math.random() * (canvas.height - horizonY);
            }
            ctx.strokeStyle = `rgba(88, 166, 255, ${p.alpha})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x + p.length, p.y);
            ctx.stroke();
          });

          // Car 3D perspective drawing
          const carProgress = Math.min(1, progress / 0.40);
          const scale = 0.03 + Math.pow(carProgress, 4.5) * 80.0;
          const s = scale;
          const centerY = canvas.height / 2;
          const carX = centerX;
          const grilleCenterY = horizonY + Math.pow(carProgress, 2.5) * (centerY - horizonY);
          const carY = grilleCenterY + 8.5 * s;

          const drawHeadlightGlow = (hx, hy) => {
            if (s < 0.1) return;
            const glowRad = 55 * s;
            const radGrad = ctx.createRadialGradient(hx, hy, 1 * s, hx, hy, glowRad);
            radGrad.addColorStop(0, "rgba(88, 166, 255, 0.4)");
            radGrad.addColorStop(0.2, "rgba(88, 166, 255, 0.12)");
            radGrad.addColorStop(1, "rgba(88, 166, 255, 0)");
            ctx.fillStyle = radGrad;
            ctx.beginPath();
            ctx.arc(hx, hy, glowRad, 0, Math.PI * 2);
            ctx.fill();
          };

          if (carProgress < 0.98) {
            drawHeadlightGlow(carX - 29 * s, carY - 12 * s);
            drawHeadlightGlow(carX + 29 * s, carY - 12 * s);
          }

          // Car shadow
          ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
          ctx.beginPath();
          ctx.ellipse(carX, carY, 48 * s, 8 * s, 0, 0, Math.PI * 2);
          ctx.fill();

          // Car body outline
          ctx.fillStyle = theme === "dark" ? "#040404" : "#E6EDF0";
          ctx.strokeStyle = "#58A6FF";
          ctx.lineWidth = Math.max(1, 1.8 * s);
          ctx.shadowColor = "#58A6FF";
          ctx.shadowBlur = Math.min(20, 4 * s);

          ctx.beginPath();
          ctx.moveTo(carX - 44 * s, carY);
          ctx.lineTo(carX - 44 * s, carY - 10 * s);
          ctx.quadraticCurveTo(carX - 45 * s, carY - 15 * s, carX - 38 * s, carY - 14 * s);
          ctx.quadraticCurveTo(carX - 46 * s, carY - 18 * s, carX - 34 * s, carY - 18 * s);
          ctx.lineTo(carX - 22 * s, carY - 17 * s);
          ctx.lineTo(carX - 20 * s, carY - 19 * s);
          ctx.quadraticCurveTo(carX - 16 * s, carY - 30 * s, carX - 12 * s, carY - 31 * s);
          ctx.lineTo(carX + 12 * s, carY - 31 * s);
          ctx.quadraticCurveTo(carX + 16 * s, carY - 30 * s, carX + 20 * s, carY - 19 * s);
          ctx.lineTo(carX + 22 * s, carY - 17 * s);
          ctx.lineTo(carX + 34 * s, carY - 18 * s);
          ctx.quadraticCurveTo(carX + 46 * s, carY - 18 * s, carX + 38 * s, carY - 14 * s);
          ctx.quadraticCurveTo(carX + 45 * s, carY - 15 * s, carX + 44 * s, carY - 10 * s);
          ctx.lineTo(carX + 44 * s, carY);
          ctx.lineTo(carX - 44 * s, carY);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          // Windshield
          ctx.fillStyle = theme === "dark" ? "rgba(88, 166, 255, 0.25)" : "rgba(31, 111, 235, 0.2)";
          ctx.beginPath();
          ctx.moveTo(carX - 18 * s, carY - 18 * s);
          ctx.quadraticCurveTo(carX - 14 * s, carY - 29 * s, carX - 10 * s, carY - 29 * s);
          ctx.lineTo(carX + 10 * s, carY - 29 * s);
          ctx.quadraticCurveTo(carX + 14 * s, carY - 29 * s, carX + 18 * s, carY - 18 * s);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          // Windshield Glare
          ctx.strokeStyle = "rgba(255, 255, 255, 0.35)";
          ctx.lineWidth = Math.max(0.5, 1 * s);
          ctx.beginPath();
          ctx.moveTo(carX - 12 * s, carY - 27 * s);
          ctx.lineTo(carX + 2 * s, carY - 19 * s);
          ctx.moveTo(carX - 8 * s, carY - 28 * s);
          ctx.lineTo(carX + 6 * s, carY - 20 * s);
          ctx.stroke();

          // Mirrors
          ctx.fillStyle = theme === "dark" ? "#020202" : "#FFFFFF";
          ctx.strokeStyle = "#58A6FF";
          ctx.lineWidth = Math.max(1, 1.5 * s);
          // Left
          ctx.beginPath();
          ctx.moveTo(carX - 20 * s, carY - 19 * s);
          ctx.lineTo(carX - 30 * s, s > 0.5 ? carY - 20.5 * s : carY - 20 * s);
          ctx.quadraticCurveTo(carX - 33 * s, carY - 23 * s, carX - 28 * s, carY - 22 * s);
          ctx.lineTo(carX - 20 * s, carY - 20 * s);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          // Right
          ctx.beginPath();
          ctx.moveTo(carX + 20 * s, carY - 19 * s);
          ctx.lineTo(carX + 30 * s, s > 0.5 ? carY - 20.5 * s : carY - 20 * s);
          ctx.quadraticCurveTo(carX + 33 * s, carY - 23 * s, carX + 28 * s, carY - 22 * s);
          ctx.lineTo(carX + 20 * s, carY - 20 * s);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          // Hood details
          ctx.strokeStyle = "rgba(88, 166, 255, 0.6)";
          ctx.lineWidth = Math.max(0.5, 1.2 * s);
          ctx.beginPath();
          ctx.moveTo(carX - 10 * s, carY - 17 * s);
          ctx.lineTo(carX - 6 * s, carY - 23 * s);
          ctx.moveTo(carX + 10 * s, carY - 17 * s);
          ctx.lineTo(carX + 6 * s, carY - 23 * s);
          ctx.stroke();

          // Grille (Shield)
          ctx.fillStyle = "#020202";
          ctx.strokeStyle = "#58A6FF";
          ctx.lineWidth = Math.max(1, 1.8 * s);
          ctx.beginPath();
          ctx.moveTo(carX - 18 * s, carY - 15 * s);
          ctx.lineTo(carX + 18 * s, carY - 15 * s);
          ctx.lineTo(carX + 22 * s, carY - 9 * s);
          ctx.lineTo(carX + 15 * s, carY - 2 * s);
          ctx.lineTo(carX - 15 * s, carY - 2 * s);
          ctx.lineTo(carX - 22 * s, carY - 9 * s);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          // Honeycomb Mesh inside Grille
          ctx.strokeStyle = "rgba(88, 166, 255, 0.22)";
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          for (let yOffset = 3; yOffset <= 14; yOffset += 1.5) {
            let wAtY = yOffset < 9 ? (18 + (9 - yOffset) * 0.6) : (15 + (yOffset - 2) * 0.7);
            ctx.moveTo(carX - wAtY * s, carY - yOffset * s);
            ctx.lineTo(carX + wAtY * s, carY - yOffset * s);
          }
          for (let xOffset = -18; xOffset <= 18; xOffset += 4) {
            ctx.moveTo(carX + xOffset * s, carY - 2 * s);
            ctx.lineTo(carX + xOffset * 0.8 * s, carY - 15 * s);
          }
          ctx.stroke();

          // Air Ducts
          ctx.fillStyle = "#030303";
          ctx.strokeStyle = "#58A6FF";
          ctx.lineWidth = Math.max(1, 1.5 * s);
          // Left
          ctx.beginPath();
          ctx.moveTo(carX - 40 * s, carY - 3 * s);
          ctx.lineTo(carX - 22 * s, carY - 3 * s);
          ctx.lineTo(carX - 20 * s, carY - 9 * s);
          ctx.lineTo(carX - 35 * s, carY - 10 * s);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          // Right
          ctx.beginPath();
          ctx.moveTo(carX + 40 * s, carY - 3 * s);
          ctx.lineTo(carX + 22 * s, carY - 3 * s);
          ctx.lineTo(carX + 20 * s, carY - 9 * s);
          ctx.lineTo(carX + 35 * s, carY - 10 * s);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          // Headlights housing & lasers
          ctx.fillStyle = "#0a0a0a";
          ctx.strokeStyle = "#58A6FF";
          ctx.lineWidth = Math.max(1, 1.5 * s);
          // Left
          ctx.beginPath();
          ctx.moveTo(carX - 38 * s, carY - 14 * s);
          ctx.lineTo(carX - 20 * s, carY - 11 * s);
          ctx.lineTo(carX - 22 * s, carY - 13 * s);
          ctx.lineTo(carX - 35 * s, carY - 15 * s);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          // Right
          ctx.beginPath();
          ctx.moveTo(carX + 38 * s, carY - 14 * s);
          ctx.lineTo(carX + 20 * s, carY - 11 * s);
          ctx.lineTo(carX + 22 * s, carY - 13 * s);
          ctx.lineTo(carX + 35 * s, carY - 15 * s);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          // Laser strips
          ctx.fillStyle = "#FFFFFF";
          // Left
          ctx.beginPath();
          ctx.arc(carX - 33 * s, carY - 13.5 * s, Math.max(0.5, 1.2 * s), 0, Math.PI * 2);
          ctx.arc(carX - 29 * s, carY - 12.5 * s, Math.max(0.5, 1.2 * s), 0, Math.PI * 2);
          ctx.arc(carX - 25 * s, carY - 11.5 * s, Math.max(0.5, 1.2 * s), 0, Math.PI * 2);
          ctx.fill();
          // Right
          ctx.beginPath();
          ctx.arc(carX + 33 * s, carY - 13.5 * s, Math.max(0.5, 1.2 * s), 0, Math.PI * 2);
          ctx.arc(carX + 29 * s, carY - 12.5 * s, Math.max(0.5, 1.2 * s), 0, Math.PI * 2);
          ctx.arc(carX + 25 * s, carY - 11.5 * s, Math.max(0.5, 1.2 * s), 0, Math.PI * 2);
          ctx.fill();

          ctx.shadowBlur = 0;
          animationFrameId = requestAnimationFrame(render);
        };

        animationFrameId = requestAnimationFrame(render);

        return () => {
          cancelAnimationFrame(animationFrameId);
          window.removeEventListener("resize", resize);
        };
      }, [introFinished, theme]);

      // 2. Background wireframe network nodes
      useEffect(() => {
        if (!introFinished) return;
        const canvas = bgCanvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;

        let animationFrameId;
        let angle = 0;

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        resize();
        window.addEventListener("resize", resize);

        const nodes = Array.from({ length: 25 }, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
        }));

        const render = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const isDark = theme === "dark";
          const lineColor = isDark ? "rgba(88, 166, 255, 0.08)" : "rgba(31, 111, 235, 0.06)";
          const nodeColor = isDark ? "rgba(88, 166, 255, 0.25)" : "rgba(31, 111, 235, 0.2)";

          angle += 0.005;
          const centerX = canvas.width * 0.25;
          const centerY = canvas.height * 0.5;

          ctx.strokeStyle = lineColor;
          ctx.lineWidth = 1;
          for (let r = 100; r < 800; r += 100) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, r + Math.sin(angle) * 10, 0, Math.PI * 2);
            ctx.stroke();
          }

          nodes.forEach((node, i) => {
            node.x += node.vx;
            node.y += node.vy;

            if (node.x < 0 || node.x > canvas.width) node.vx *= -1;
            if (node.y < 0 || node.y > canvas.height) node.vy *= -1;

            ctx.fillStyle = nodeColor;
            ctx.beginPath();
            ctx.arc(node.x, node.y, 2, 0, Math.PI * 2);
            ctx.fill();

            for (let j = i + 1; j < nodes.length; j++) {
              const dx = nodes[j].x - node.x;
              const dy = nodes[j].y - node.y;
              const dist = Math.sqrt(dx * dx + dy * dy);

              if (dist < 200) {
                ctx.strokeStyle = isDark 
                  ? `rgba(88, 166, 255, ${0.1 * (1 - dist / 200)})` 
                  : `rgba(31, 111, 235, ${0.08 * (1 - dist / 200)})`;
                ctx.beginPath();
                ctx.moveTo(node.x, node.y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.stroke();
              }
            }
          });

          animationFrameId = requestAnimationFrame(render);
        };

        animationFrameId = requestAnimationFrame(render);

        return () => {
          cancelAnimationFrame(animationFrameId);
          window.removeEventListener("resize", resize);
        };
      }, [introFinished, theme]);

      // Safe JSON Request Client
      const safeFetchJson = async (url, options) => {
        try {
          const response = await fetch(url, options);
          const text = await response.text();
          let data = {};
          try {
            data = text ? JSON.parse(text) : {};
          } catch (e) {
            throw new Error(`Server returned invalid response format (${response.status}).`);
          }
          if (!response.ok) {
            throw { status: response.status, message: data.error || "Request failed." };
          }
          return data;
        } catch (err) {
          if (err.status) throw err;
          throw new Error(err.message || "Unable to contact verification server. Ensure the backend is active.");
        }
      };

      // Submit Form Handler
      const handleSubmit = async (e) => {
        e.preventDefault();
        setIsLoading(true);

          if (authMode === "register") {
            if (!operatorName || !email || !password || !confirmPassword) {

              setIsLoading(false);
              return;

            if (password !== confirmPassword) {
              setErrorMsg("Passwords do not match.");
              setIsLoading(false);
              return;
            }
            const checkPasswordStrength = (pass) => {
              if (pass.length < 8) return "Password must be at least 8 characters long.";
              if (!/[A-Z]/.test(pass)) return "Password must contain at least one uppercase letter.";
              if (!/[a-z]/.test(pass)) return "Password must contain at least one lowercase letter.";
              if (!/[0-9]/.test(pass)) return "Password must contain at least one number.";
              if (!/[!@#$%^&*()_+\-=\[\]\{\}|;:',.<>\/?]/.test(pass)) return "Password must contain at least one special character (!@#$%^&* etc.).";
              return null;
            };
            const strengthError = checkPasswordStrength(password);
            if (strengthError) {
              setErrorMsg(strengthError);
              setIsLoading(false);
              return;

            const data = await safeFetchJson("/api/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name: operatorName, email, password }),
            });

            if (data.requiresVerification) {
              setSuccessMsg(data.message || "Operator profile initiated. Enter verification code.");
              setAuthMode("otp");
            } else {
              setSuccessMsg("Operator account created! Switch to sign-in...");
              setTimeout(() => {
                setAuthMode("login");
                setSuccessMsg("");
                setPassword("");

            }
          } else if (authMode === "login") {
            if (!email || !password) {
              setErrorMsg("Email and password are required.");
              setIsLoading(false);
              return;
            }

            try {
              const data = await safeFetchJson("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password }),
              });

              if (data.token) {
                localStorage.setItem("drivesphere_token", data.token);
                localStorage.setItem("drivesphere_operator", JSON.stringify(data.operator));
              }

              setSuccessMsg("Authentication Successful. Initializing DriveSphere E-Horizon...");
              setTimeout(() => {
                setIsLoading(false);
                const baseUrl = config.dashboardUrl || (window.location.port === "5000" ? `${window.location.protocol}//${window.location.hostname}:3000` : window.location.origin);
                const redirectUrl = `${baseUrl.replace(/\/$/, "")}/?token=${encodeURIComponent(data.token)}&operator=${encodeURIComponent(JSON.stringify(data.operator))}`;
                window.location.href = redirectUrl;
                setSuccessMsg("");
              }, 1500);
            } catch (error) {
              if (error.status === 403) {
                setErrorMsg(error.message);
                setAuthMode("otp");
                setIsLoading(false);
                return;
              }
              throw error;
            }
          } else if (authMode === "otp") {
            if (!otpCode) {
              setErrorMsg("Please enter the 6-digit verification code.");
              setIsLoading(false);
              return;
            }

            const data = await safeFetchJson("/api/verify-otp", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, otp: otpCode }),
            });

            setSuccessMsg(data.message || "Account successfully verified! Authorization granted.");
            setOtpCode("");
            setTimeout(() => {
              setAuthMode("login");
              setSuccessMsg("");
              setPassword("");
            }, 2000);
          } else if (authMode === "forgot") {
            if (!email) {
              setErrorMsg("Email address is required.");
              setIsLoading(false);
              return;
            }

            const data = await safeFetchJson("/api/forgot-password", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email }),
            });

            setSuccessMsg(data.message || "A reset code has been sent to your email.");
            setTimeout(() => {
              setAuthMode("reset_otp");
              setSuccessMsg("");
              setOtpCode("");
              setPassword("");
              setConfirmPassword("");
            }, 2000);
          } else if (authMode === "reset_otp") {
            if (!otpCode || !password || !confirmPassword) {
              setErrorMsg("All fields are required.");
              setIsLoading(false);
              return;
            }
            if (password !== confirmPassword) {
              setErrorMsg("Passwords do not match.");
              setIsLoading(false);
              return;

              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, otp: otpCode, password }),

            setSuccessMsg(data.message || "Password successfully updated! You can now log in.");
            setOtpCode("");
            setTimeout(() => {
              setAuthMode("login");
              setSuccessMsg("");
              setPassword("");
              setConfirmPassword("");
            }, 2500);
          }

          setErrorMsg(error.message || "An unexpected network error occurred.");
        } finally {
          setIsLoading(false);

                          <label
                            htmlFor="otpCode"
                            className={`absolute left-12 transition-all duration-200 pointer-events-none ${
                              isFocused.otpCode || otpCode
                                ? "top-1.5 text-[10px] font-semibold uppercase tracking-wider opacity-80 " + (theme === "dark" ? "text-[#58A6FF]" : "text-[#1F6FEB]")
                                : "top-3.5 text-sm opacity-50"
                            }`}
                          >
                            Verification Code (OTP)
                          </label>
                        </div>
                      )}

                      {/* Remember Telemetry session checkbox */}
                      {authMode === "login" && (
                        <div className="flex items-center justify-between text-xs">
                          <label className="flex items-center gap-2 cursor-pointer select-none opacity-80 hover:opacity-100 transition-opacity">
                            <input 
                              type="checkbox" 
                              className={`rounded border-gray-400 text-[#1F6FEB] focus:ring-0 w-3.5 h-3.5 ${
                                theme === "dark" ? "bg-white/5 border-white/20" : "bg-black/5 border-black/20"
                              }`}
                            />
                            <span>Remember telemetry session</span>
                          </label>
                          <a 
                            href="#forgot" 
                            onClick={(e) => {
                              e.preventDefault();
                              setAuthMode("forgot");
                              setErrorMsg("");
                              setSuccessMsg("");
                            }}
                            className={`font-semibold hover:underline transition-all ${
                              theme === "dark" ? "text-[#58A6FF]" : "text-[#1F6FEB]"
                            }`}
                          >
                            Forgot Password?
                          </a>
                        </div>
                      )}

                      {/* Resend OTP button */}
                      {(authMode === "otp" || authMode === "reset_otp") && (
                        <div className="flex justify-end text-xs my-2">
                          <button
                            type="button"
                            onClick={handleResendOtp}
                            disabled={isLoading}
                            className={`font-semibold hover:underline bg-transparent border-none cursor-pointer p-0 ${
                              theme === "dark" ? "text-[#58A6FF]" : "text-[#1F6FEB]"
                            }`}
                          >
                            Resend Code
                          </button>
                        </div>
                      )}

                      {/* Submit */}
                      <button
                        type="submit"
                        disabled={isLoading}
                        className={`w-full py-3.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 shadow-lg transition-all duration-300 relative overflow-hidden group hover:scale-[1.01] active:scale-[0.99] ${
                          theme === "dark"
                            ? "bg-[#58A6FF] text-black hover:bg-[#79c0ff] shadow-[#58A6FF]/20"
                            : "bg-[#1F6FEB] text-white hover:bg-[#1a5cc7] shadow-[#1F6FEB]/25"
                        }`}
                      >
                        {isLoading ? (
                          <div className="w-5 h-5 border-2 border-current border-t-transparent rounded-full animate-spin" />
                        ) : (
                          <>
                            <span>
                              {authMode === "login" 
                                ? "Initialize System" 
                                : authMode === "register" 
                                ? "Register Operator" 
                                : authMode === "forgot"
                                ? "Send Reset Code"
                                : authMode === "reset_otp"
                                ? "Reset Password"
                                : "Verify Account"}
                            </span>
                            <ArrowRightIcon className="group-hover:translate-x-1 transition-transform w-4 h-4" />
                          </>
                        )}
                      </button>
                    </form>

                    {/* Connect With Google */}
                    <div className="relative my-6 flex items-center justify-center">
                      <div className="absolute inset-0 flex items-center">
                        <div className={`w-full border-t ${theme === "dark" ? "border-white/10" : "border-gray-200"}`}></div>
                      </div>
                      <span className={`relative px-3 text-[10px] uppercase tracking-widest font-semibold backdrop-blur-md ${
                        theme === "dark" ? "bg-black text-[#8B949E]" : "bg-white text-gray-400"
                      }`}>
                        Or Connect With
                      </span>
                    </div>

                    <div className="w-full">
                      <button 
                        type="button"
                        onClick={handleGoogleLogin}
                        className={`w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border text-xs font-semibold transition-all duration-200 hover:scale-[1.02] active:scale-[0.98] ${
                          theme === "dark"
                            ? "border-white/10 bg-white/5 hover:bg-white/10 text-white"
                            : "border-gray-200 bg-gray-50 hover:bg-gray-100 text-gray-800"
                        }`}
                      >
                        <svg className="w-4 h-4" viewBox="0 0 24 24">
                          <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" />
                          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" />
                        </svg>
                        <span>Connect with Google</span>
                      </button>
                    </div>

                    {/* Footer toggles */}
                    <p className={`mt-6 text-center text-xs ${theme === "dark" ? "text-[#8B949E]" : "text-gray-500"}`}>
                      {authMode === "otp" ? (
                        <>
                          Wrong email address?{" "}
                          <button 
                            type="button"
                            onClick={() => {
                              setAuthMode("register");
                              setErrorMsg("");
                              setSuccessMsg("");
                            }}
                            className={`font-semibold hover:underline bg-transparent border-none cursor-pointer p-0 ${
                              theme === "dark" ? "text-[#58A6FF]" : "text-[#1F6FEB]"
                            }`}
                          >
                            Change Registration
                          </button>
                          {" or "}
                          <button 
                            type="button"
                            onClick={() => {
                              setAuthMode("login");
                              setErrorMsg("");
                              setSuccessMsg("");
                            }}
                            className={`font-semibold hover:underline bg-transparent border-none cursor-pointer p-0 ${
                              theme === "dark" ? "text-[#58A6FF]" : "text-[#1F6FEB]"
                            }`}
                          >
                            Back to Login
                          </button>
                        </>
                      ) : authMode === "login" ? (
                        <>
                          Need fleet authorization?{" "}
                          <button 
                            type="button"
                            onClick={() => {
                              setAuthMode("register");
                              setErrorMsg("");
                              setSuccessMsg("");
                            }}
                            className={`font-semibold hover:underline bg-transparent border-none cursor-pointer p-0 ${
                              theme === "dark" ? "text-[#58A6FF]" : "text-[#1F6FEB]"
                            }`}
                          >
                            Request Operator Account
                          </button>
                        </>
                      ) : (
                        <>
                          Already registered?{" "}
                          <button 
                            type="button"
                            onClick={() => {
                              setAuthMode("login");
                              setErrorMsg("");
                              setSuccessMsg("");
                            }}
                            className={`font-semibold hover:underline bg-transparent border-none cursor-pointer p-0 ${
                              theme === "dark" ? "text-[#58A6FF]" : "text-[#1F6FEB]"
                            }`}
                          >
                            Back to Login
                          </button>
                        </>
                      )}
                    </p>
                  </div>
                </div>

              </div>
            </div>
          )}
        </div>
      );
    }

    // Helper FeatureCard
    function FeatureCard({ icon, title, description, theme }) {
      return (
        <div className={`p-5 rounded-2xl border transition-all duration-300 backdrop-blur-sm group hover:scale-[1.02] ${
          theme === "dark"
            ? "bg-black/40 border-white/5 hover:border-white/15 hover:bg-black/80"
            : "bg-white/60 border-gray-200/80 hover:border-blue-500/30 hover:bg-white shadow-sm"
        }`}>
          <div className="flex items-center gap-3 mb-2">
            <div className={`p-2.5 rounded-xl transition-transform duration-300 group-hover:scale-110 ${
              theme === "dark" ? "bg-white/5" : "bg-blue-50"
            }`}>
              {icon}
            </div>
            <h3 className="font-bold text-sm tracking-tight">{title}</h3>
          </div>
          <p className={`text-xs leading-relaxed ${
            theme === "dark" ? "text-[#8B949E]" : "text-gray-600"
          }`}>
            {description}
          </p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
